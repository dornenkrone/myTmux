# Minimal tmux configuration without plugins.

##### Prefix #####
unbind-key C-b
set-option -g prefix C-x
bind-key C-x send-prefix
bind-key r source-file ~/.tmux.conf \; display-message "Tmux config updated"

##### Shell and terminal #####
set-option -g default-shell /bin/zsh
set -g default-terminal xterm-256color
set-option -ga terminal-overrides ",*256col*:Tc"
set -s escape-time 0

##### Behavior #####
setw -g monitor-activity off
set -g automatic-rename on
set -g history-limit 800000
set -g mouse on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

##### Panes #####
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind-key h select-pane -L
bind-key l select-pane -R
bind-key k select-pane -U
bind-key j select-pane -D
bind-key o split-window -h
bind-key e split-window -v
bind-key H resize-pane -L
bind-key L resize-pane -R
bind-key K resize-pane -U
bind-key J resize-pane -D
bind-key m resize-pane -Z
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

##### Windows #####
bind-key C-h previous-window
bind-key C-l next-window
setw -g window-status-current-format ' #[fg=blue,bold]#I #[fg=white,bold]#W'
setw -g window-status-format '#[fg=white]#I #W'
set -wg window-status-separator '  '

##### Theme #####
set-option -g pane-active-border-style fg=blue
set-option -g pane-border-style fg=cyan
set-option -g message-style bg=blue,fg=white

##### Status bar #####
set -g status on
set -g status-bg black
set -g status-fg white
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 120

set -g status-left ""
set -ag status-left "#[fg=cyan,bold]#H "
set -ag status-left "#[fg=yellow,bold] #S "

set -g status-right ""
set -ag status-right "#[fg=green]%a %Y-%m-%d %H:%M:%S"
